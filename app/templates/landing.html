<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Search 3.8 million corporate titles in England and Wales. The HM Land Registry CCOD dataset, indexed by company, address, or director.">
<meta name="robots" content="index, follow">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://landregistry.company/">
<meta property="og:title" content="UK Land Registry Search | Corporate Property Ownership Lookup">
<meta property="og:description" content="Free UK land registry search tool. Find properties owned by companies using company name, number, or address. Instant CCOD database search with export options.">
<meta property="og:site_name" content="UK Land Registry Search">
<meta property="og:image" content="https://landregistry.company/static/og-image.png">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:url" content="https://landregistry.company/">
<meta name="twitter:title" content="UK Land Registry Search | Corporate Property Ownership Lookup">
<meta name="twitter:description" content="Free UK land registry search tool. Find properties owned by companies using company name, number, or address.">
<meta name="twitter:image" content="https://landregistry.company/static/og-image.png">

<title>UK corporate land registry search · landregistry.company</title>
<link rel="canonical" href="https://landregistry.company/">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">

<link rel="stylesheet" href="{{ url_for('static', filename='design/tokens.css') }}"/>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

{% if ga4_measurement_id %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ ga4_measurement_id }}"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ ga4_measurement_id }}');
</script>
{% endif %}

<script>
  // Asset locations resolved through Flask, exposed to the JSX components
  // so they don't have to know about Flask routes.
  window.LR_ASSETS = {
    logoMark: "{{ url_for('static', filename='design/assets/logo-mark.svg') }}"
  };
</script>

<style>
  html, body { min-height: 100%; margin: 0; }
  body {
    font: var(--t-body);
    color: var(--ink);
    background: var(--paper);
  }

  .lr-particles {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    mix-blend-mode: multiply;
    filter: contrast(1.05);
  }

  .lr-hero-bg {
    position: absolute; inset: 0; z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 60% 80% at 50% -20%,
        rgba(31, 81, 48, 0.05) 0%, transparent 55%),
      radial-gradient(ellipse 40% 60% at 85% 110%,
        rgba(184, 139, 30, 0.04) 0%, transparent 55%);
  }

  .lr-hero-rule {
    position: absolute; left: 32px; right: 32px;
    height: 1px; background: var(--line);
    z-index: 1;
  }

  .lr-method:hover { background: var(--paper-soft); }
  .lr-suggest-row:hover { background: var(--paper-soft); }
  a.lr-link:hover, a[href]:hover { color: var(--brand-800); }

  .lr-progress {
    position: fixed; top: 0; left: 0; height: 2px;
    background: var(--brand-700);
    z-index: 1000;
    transition: width 320ms var(--ease);
    pointer-events: none;
  }

  @media (max-width: 960px) {
    .lr-nav-links, .lr-stats-wrap { display: none !important; }
  }

  .lr-hero-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.25fr) minmax(0, 1fr);
    column-gap: 48px;
    align-items: end;
  }
  @media (max-width: 960px) {
    .lr-hero-grid { grid-template-columns: 1fr; row-gap: 40px; }
    .lr-hero-feed { position: static !important; }
  }

  @keyframes lrFeedIn {
    0% { opacity: 0; transform: translateY(-8px); background: var(--paper-soft); }
    100% { opacity: 1; transform: translateY(0); background: transparent; }
  }
  @keyframes lrPulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes lrTickerScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
</style>
</head>
<body>

<div id="app"></div>

<script type="text/babel" src="{{ url_for('static', filename='design/nav.jsx') }}"></script>
<script type="text/babel" src="{{ url_for('static', filename='design/search.jsx') }}"></script>
<script type="text/babel" src="{{ url_for('static', filename='design/feed.jsx') }}"></script>
<script type="text/babel" src="{{ url_for('static', filename='design/hero-map.jsx') }}"></script>
<script type="text/babel" src="{{ url_for('static', filename='design/hero-search.jsx') }}"></script>
<script type="text/babel" src="{{ url_for('static', filename='design/hero-ticker.jsx') }}"></script>
<script type="text/babel" src="{{ url_for('static', filename='design/sections.jsx') }}"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const APP_DEFAULTS = {
  accentColor: "#1F5130",
  headline: "Who owns this?",
  headlineItalic: "Follow the title, not the façade.",
  particlesEnabled: true,
};

function App() {
  const [progress, setProgress] = useState(0);
  const heroRef = useRef(null);

  // Determinate top-of-viewport progress rail
  useEffect(() => {
    let frame; let t = 0;
    const step = () => {
      t += 0.03;
      const p = Math.min(100, 20 + 80 * (1 - Math.exp(-t)));
      setProgress(p);
      if (p < 99) frame = requestAnimationFrame(step);
    };
    frame = requestAnimationFrame(step);
    return () => cancelAnimationFrame(frame);
  }, []);

  useEffect(() => {
    document.documentElement.style.setProperty('--brand-700', APP_DEFAULTS.accentColor);
  }, []);

  // Particle backdrop — only mounts if a #particles-js host exists in the hero
  useEffect(() => {
    const host = document.getElementById('particles-js');
    if (!host || !APP_DEFAULTS.particlesEnabled || !window.particlesJS) return;
    window.particlesJS('particles-js', {
      particles: {
        number: { value: 110, density: { enable: true, value_area: 900 } },
        color:  { value: '#0E1511' },
        shape:  { type: 'circle' },
        opacity:{ value: 0.55, random: true,
                  anim: { enable: true, speed: 0.25, opacity_min: 0.25, sync: false } },
        size:   { value: 1.8, random: true,
                  anim: { enable: true, speed: 1.2, size_min: 0.4, sync: false } },
        line_linked: {
          enable: true, distance: 130,
          color: '#0E1511', opacity: 0.14, width: 0.6,
        },
        move: {
          enable: true, speed: 0.35,
          direction: 'none', random: true, straight: false,
          out_mode: 'out', bounce: false,
        },
      },
      interactivity: {
        detect_on: 'canvas',
        events: {
          onhover: { enable: true, mode: 'grab' },
          onclick: { enable: false },
          resize:  true,
        },
        modes: {
          grab: { distance: 160, line_linked: { opacity: 0.3 } },
        },
      },
      retina_detect: true,
    });
  }, []);

  return (
    <>
      <div className="lr-progress" style={{width: progress + '%'}}/>

      <LRNav signedIn={ {{ 'true' if user else 'false' }} } credits={ {{ user.credits if user else 0 }} } />

      {/* ─── Hero — map-forward ─── */}
      <header ref={heroRef} style={{
        position: 'relative',
        overflow: 'hidden',
        background: 'var(--paper)',
        borderBottom: '1px solid var(--line)',
        isolation: 'isolate',
      }}>
        {/* Cartographic backdrop */}
        <LRMapBackdrop/>

        {/* Corner metadata — upper-left sheet reference */}
        <div style={{
          position:'absolute', top:24, left:32, zIndex:3,
          display:'flex', alignItems:'center', gap:10,
          font:'500 11px/1 var(--font-mono)',
          color:'var(--ink-4)', letterSpacing:'0.04em',
        }}>
          <span>SHEET EW-144</span>
          <span style={{width:1, height:10, background:'var(--line-strong)'}}/>
          <span>CCOD v2026.04</span>
          <span style={{width:1, height:10, background:'var(--line-strong)'}}/>
          <span style={{display:'inline-flex', alignItems:'center', gap:6}}>
            <span style={{width:6, height:6, borderRadius:'50%', background:'var(--ok)'}}/>
            3,814,226 titles indexed
          </span>
        </div>

        {/* Primary content — single focal column, left-weighted */}
        <div style={{
          position:'relative', zIndex:3,
          maxWidth:1200, margin:'0 auto',
          padding:'140px 32px 100px',
        }}>
          <div style={{maxWidth:780}}>
            <h1 style={{
              font:'600 clamp(2.6rem, 1.2rem + 4vw, 4.4rem)/1.02 var(--font-display)',
              letterSpacing:'-0.025em',
              color:'var(--ink)',
              margin:'0 0 20px',
              textWrap:'balance',
            }}>
              {APP_DEFAULTS.headline}<br/>
              <span style={{
                color:'var(--ink-3)',
                fontStyle:'italic',
                fontWeight:400,
              }}>
                {APP_DEFAULTS.headlineItalic}
              </span>
            </h1>

            <p style={{
              font:'var(--t-body-lg)',
              color:'var(--ink-2)',
              marginBottom:36,
              maxWidth:620,
              textWrap:'pretty',
            }}>
              A searchable index of every freehold and leasehold interest in England &amp;
              Wales registered to a UK or overseas company — cross-referenced with
              Companies House director history.
            </p>

            <LRHeroSearch/>
          </div>
        </div>

        {/* Live register ticker — thin strip at the bottom edge */}
        <div style={{position:'relative', zIndex:3}}>
          <LRRegisterTicker/>
        </div>
      </header>

      {/* ─── Stats strip ─── */}
      <div style={{background:'var(--paper)'}}>
        <div style={{maxWidth:1200, margin:'0 auto', padding:'0 32px'}} className="lr-stats-wrap">
          <LRStats/>
        </div>
      </div>

      {/* ─── Search methods ─── */}
      <LRSection
        id="methods"
        eyebrow="Search methods"
        title="Three ways to interrogate the register."
        sub="Each method queries the same index — use whichever matches what you know."
        tone="paper-soft"
      >
        <LRMethods/>
      </LRSection>

      {/* ─── Data source callout ─── */}
      <LRSection id="data" eyebrow="Data source">
        <LRData/>
      </LRSection>

      {/* ─── Audience ─── */}
      <LRSection
        id="audience"
        eyebrow="Audience"
        title="Built for people doing real work with the register."
        tone="paper-soft"
      >
        <LRAudience/>
      </LRSection>

      {/* ─── Pricing ─── */}
      <LRSection
        id="pricing"
        eyebrow="Pricing"
        title="Pay per search. No subscription."
        sub="The data is public. We charge only for the index, the cross-reference, and the export."
      >
        <LRPricing/>
      </LRSection>

      {/* ─── Final CTA ─── */}
      <section style={{
        background: 'var(--brand-700)',
        borderTop: '1px solid var(--brand-800)',
        color: '#fff',
      }}>
        <div style={{
          maxWidth: 1200, margin: '0 auto',
          padding: '64px 32px',
          display: 'grid', gridTemplateColumns: '1fr auto', gap: 40,
          alignItems: 'center',
        }}>
          <div>
            <div style={{
              font: '600 11px/1 var(--font-body)',
              textTransform: 'uppercase', letterSpacing: '0.14em',
              color: 'rgba(255,255,255,0.65)', marginBottom: 12,
            }}>Run a search</div>
            <h2 style={{
              font: '600 clamp(1.8rem, 1rem + 1.8vw, 2.6rem)/1.08 var(--font-display)',
              letterSpacing: '-0.015em', color: '#fff',
              maxWidth: 720,
            }}>
              Follow the title. The register will tell you who owns it.
            </h2>
          </div>
          <a href="/search" style={{
            display: 'inline-flex', alignItems: 'center', gap: 10,
            padding: '16px 28px',
            background: 'var(--paper)', color: 'var(--brand-800)',
            border: '1px solid rgba(255,255,255,0.15)',
            borderRadius: 4, textDecoration: 'none',
            font: '600 13px/1 var(--font-body)',
            textTransform: 'uppercase', letterSpacing: '0.14em',
          }}>
            Search the register
            <i className="ph ph-arrow-right" style={{fontSize:14}}></i>
          </a>
        </div>
      </section>

      <LRFooter/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
