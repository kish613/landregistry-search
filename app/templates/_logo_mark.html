{# Inline SVG logo mark. Optional `size` (default 30). #}
{% set _size = size|default(30) %}
<svg class="lr-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="{{ _size }}" height="{{ _size }}" role="img" aria-label="Land Registry" focusable="false">
    <rect class="lr-mark-rect lr-mark-tl" x="24"  y="24"  width="76"  height="76"  fill="#1f5130"/>
    <rect class="lr-mark-rect lr-mark-tr" x="152" y="48"  width="40"  height="40"  fill="#b88b1e"/>
    <rect class="lr-mark-rect lr-mark-bl" x="24"  y="116" width="100" height="100" fill="#1f5130"/>
    <rect class="lr-mark-rect lr-mark-br" x="140" y="132" width="76"  height="84"  fill="#1f5130"/>
</svg>
