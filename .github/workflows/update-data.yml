name: Update Land Registry Data

on:
  schedule:
    # Run on the 5th of each month at 03:00 UTC
    # Data is published from the 2nd working day — the 5th gives buffer
    - cron: '0 3 5 * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary requests

      - name: Run data update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LAND_REGISTRY_API_KEY: ${{ secrets.LAND_REGISTRY_API_KEY }}
        run: python scripts/update_data.py
